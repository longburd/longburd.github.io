<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>l o n g b i r d</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a08;
    font-family: 'Georgia', serif;
  }

  #gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(100%, 480px), 1fr));
    gap: 0.5rem;
  }

  .photo {
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  .photo.loaded {
    opacity: 1;
  }

  #status {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    color: #444;
    font-size: 14px;
    letter-spacing: 0.1em;
    font-family: 'Georgia', serif;
  }

  #error {
    display: none;
    align-items: center;
    justify-content: center;
    height: 100vh;
    color: #554;
    font-size: 13px;
    text-align: center;
    padding: 2rem;
    line-height: 1.8;
    font-family: 'Georgia', serif;
  }
</style>
</head>
<body>

<div id="status">loading</div>
<div id="error"></div>
<div id="gallery"></div>

<script>
  // ─────────────────────────────────────────────
  const FOLDER_ID = '1iR7ZkLMSWd49Bi9swjiZ471ivVkLnyEO';
  // Get this from the folder URL: drive.google.com/drive/folders/THIS_PART

  const API_KEY = 'AIzaSyAMVP0K94jnpwm-6rSgKV2dZJ9iD8IVaa8';
  // Get this from console.cloud.google.com
  // ─────────────────────────────────────────────
 
  async function loadGallery() {
    const status = document.getElementById('status');
    const error = document.getElementById('error');
    const gallery = document.getElementById('gallery');

    try {
      const url = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+mimeType+contains+'image/'&fields=files(id,name,createdTime)&orderBy=name+desc&key=${API_KEY}`;
      const res = await fetch(url);

      if (!res.ok) throw new Error(`API error ${res.status}`);

      const data = await res.json();
      const files = data.files || [];

      status.style.display = 'none';

      if (files.length === 0) {
        error.style.display = 'flex';
        error.textContent = 'No images found in folder.';
        return;
      }

      files.forEach(file => {
        const img = document.createElement('img');
        img.className = 'photo';
        img.alt = '';
        img.loading = 'lazy';
        img.src = `https://drive.google.com/thumbnail?id=${file.id}&sz=w800`;
        img.addEventListener('load', () => img.classList.add('loaded'));
        img.addEventListener('error', () => {
          // Fall back to full export URL if thumbnail fails
          img.src = `https://drive.google.com/uc?export=view&id=${file.id}`;
        });
        gallery.appendChild(img);
      });

    } catch (err) {
      status.style.display = 'none';
      error.style.display = 'flex';
      error.innerHTML = `Could not load photos.<br><small style="color:#333;margin-top:8px;display:block">${err.message}</small>`;
      console.error(err);
    }
  }

  loadGallery();
</script>

</body>
</html>
